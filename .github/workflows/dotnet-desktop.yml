name: .NET Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 6.0.x

    - name: Restore dependencies
      run: dotnet restore ./CyberSecurityChatbot/CyberSecurityChatbot.csproj

    - name: Build project
      run: dotnet build ./CyberSecurityChatbot/CyberSecurityChatbot.csproj --configuration Release --no-restore
